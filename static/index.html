<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        k8s: {
                            blue: '#326ce5',
                            darkblue: '#1a4d8f',
                            bg: '#0f172a',
                            sidebar: '#1e293b',
                            card: '#1e293b',
                            border: '#334155',
                            hover: '#374151'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .log-container {
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .status-running,
        .status-ready,
        .status-bound,
        .status-active {
            color: #22c55e;
        }

        .status-pending,
        .status-waiting {
            color: #eab308;
        }

        .status-failed,
        .status-error,
        .status-notready {
            color: #ef4444;
        }

        .status-succeeded,
        .status-completed {
            color: #3b82f6;
        }

        .status-terminating {
            color: #f97316;
        }

        .sidebar-section {
            border-left: 3px solid transparent;
            color: #e2e8f0;
        }

        .sidebar-section.active {
            border-left-color: #326ce5;
            background: rgba(50, 108, 229, 0.15);
            color: #ffffff;
        }

        .sidebar-section.active i {
            color: #326ce5 !important;
        }

        .sidebar-section:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
        }

        /* Light mode styles */
        .light .sidebar-section {
            color: #000000;
        }

        .light .sidebar-section.active {
            background: rgba(50, 108, 229, 0.1);
            color: #000000;
        }

        .light .sidebar-section:hover:not(.active) {
            background: rgba(0, 0, 0, 0.05);
            color: #000000;
        }

        .menu-badge {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
            background: #326ce5;
        }

        .circular-chart {
            display: block;
            margin: 10px auto;
            max-width: 80%;
        }

        .circle-bg {
            fill: none;
            stroke: #334155;
            stroke-width: 3.8;
        }

        .circle {
            fill: none;
            stroke-width: 2.8;
            stroke-linecap: round;
            animation: progress 1s ease-out forwards;
        }

        .circle-green {
            stroke: #22c55e;
        }

        .circle-yellow {
            stroke: #eab308;
        }

        .circle-blue {
            stroke: #3b82f6;
        }

        @keyframes progress {
            0% {
                stroke-dasharray: 0 100;
            }
        }

        .percentage {
            fill: #e2e8f0;
            font-size: 0.5em;
            text-anchor: middle;
        }

        .table-container {
            max-height: calc(100vh - 140px);
            overflow-y: auto;
        }

        .table-container table {
            border-collapse: separate;
            border-spacing: 0;
        }

        .table-container thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .breadcrumb {
            color: rgba(255, 255, 255, 0.9);
        }

        .breadcrumb .breadcrumb-category {
            color: rgba(255, 255, 255, 0.75);
            font-weight: 500;
        }

        .breadcrumb .breadcrumb-separator {
            color: rgba(255, 255, 255, 0.5);
            margin: 0 8px;
        }

        .breadcrumb .breadcrumb-current {
            color: #ffffff;
            font-weight: 600;
        }

        .breadcrumb a {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
        }

        .breadcrumb a:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        /* Light mode overrides */
        .light {
            background-color: #f1f5f9 !important;
            color: #1e293b !important;
        }

        .light #sidebar {
            background-color: #ffffff !important;
            border-color: #e2e8f0 !important;
        }

        .light #sidebar .border-slate-700 {
            border-color: #e2e8f0 !important;
        }

        .light .bg-slate-700 {
            background-color: #e2e8f0 !important;
        }

        .light .bg-slate-800 {
            background-color: #ffffff !important;
        }

        .light .bg-slate-900 {
            background-color: #f1f5f9 !important;
        }

        .light .border-slate-700 {
            border-color: #e2e8f0 !important;
        }

        .light .text-slate-200 {
            color: #334155 !important;
        }

        .light .text-slate-400 {
            color: #64748b !important;
        }

        /* Sidebar specific - pure black text in light mode */
        .light #sidebar .text-slate-400 {
            color: #000000 !important;
        }

        .light .text-white {
            color: #1e293b !important;
        }

        .light select {
            background-color: #f1f5f9 !important;
            border-color: #cbd5e1 !important;
            color: #334155 !important;
        }

        .light ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .light ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
        }

        .light .hover\:bg-slate-700:hover {
            background-color: #e2e8f0 !important;
        }

        /* Empty state styling */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
        }

        .empty-state-icon {
            font-size: 3rem;
            color: #64748b;
            margin-bottom: 1rem;
        }

        .empty-state-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .empty-state-message {
            color: #cbd5e1;
            font-size: 0.875rem;
        }

        /* Dark theme - make grey colors white (only when NOT in light mode) */
        :not(.light) .text-slate-400 {
            color: #e2e8f0 !important;
        }

        :not(.light) .text-slate-300 {
            color: #f1f5f9 !important;
        }

        /* Professional table header styling */
        .table-header {
            background: linear-gradient(180deg, #475569 0%, #334155 100%);
            border-bottom: 2px solid #326ce5;
        }

        .table-header th {
            color: #ffffff !important;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
            padding: 0.875rem 1rem;
        }

        .light .table-header {
            background: linear-gradient(180deg, #e2e8f0 0%, #cbd5e1 100%);
            border-bottom: 2px solid #326ce5;
        }

        /* Light theme modal and detail styling */
        .light .bg-slate-600 {
            background-color: #f1f5f9 !important;
        }

        .light #detail-modal .bg-slate-700 {
            background-color: #f8fafc !important;
            border: 1px solid #e2e8f0;
        }

        .light #detail-modal .bg-slate-600 {
            background-color: #f1f5f9 !important;
            border: 1px solid #e2e8f0;
        }

        .light #detail-modal .text-white {
            color: #1e293b !important;
        }

        .light #detail-modal .text-slate-400 {
            color: #64748b !important;
        }

        .light #detail-modal .text-k8s-blue {
            color: #2563eb !important;
        }

        .light #detail-modal .text-yellow-400 {
            color: #d97706 !important;
        }

        .light #detail-modal .text-green-400 {
            color: #16a34a !important;
        }

        /* Dark mode - use cyan instead of blue for better readability */
        :not(.light) .text-k8s-blue {
            color: #22d3ee !important;
        }

        .light #detail-modal .text-red-400 {
            color: #dc2626 !important;
        }

        .light #detail-modal pre {
            background-color: #e2e8f0 !important;
            color: #334155 !important;
        }

        .light #detail-modal .bg-green-600 {
            background-color: #16a34a !important;
        }

        .light #detail-modal .bg-red-600 {
            background-color: #dc2626 !important;
        }

        .light .table-header th {
            color: #1e293b !important;
        }

        .light .empty-state-title {
            color: #475569;
        }

        .light .empty-state-message {
            color: #64748b;
        }

        /* Table cell styles for Name and Namespace columns */
        .cell-name {
            color: #ffffff;
            font-weight: 500;
        }

        .cell-namespace {
            color: #ffffff;
        }

        .light .cell-name {
            color: #1e293b;
        }

        .light .cell-namespace {
            color: #1e293b;
        }

    </style>
</head>

<body class="bg-slate-900 text-slate-200 min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col overflow-y-auto">
            <!-- Logo -->
            <div class="p-4 border-b border-slate-700 flex items-center space-x-3">
                <svg class="w-8 h-8" viewBox="0 0 32 32" fill="none">
                    <path d="M16 2L2 9v14l14 7 14-7V9L16 2z" fill="#326ce5" />
                    <path d="M16 6l-8 4v8l8 4 8-4v-8l-8-4z" fill="#fff" />
                </svg>
                <span class="text-lg font-bold text-white">kubernetes</span>
            </div>

            <!-- Namespace Selector -->
            <div class="p-3 border-b border-slate-700">
                <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-2">
                    <i class="fas fa-folder text-yellow-500"></i>
                    <span>Current Namespace</span>
                </div>
                <select id="namespace-select" onchange="changeNamespace(this.value)"
                    class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-k8s-blue">
                    <option value="">All namespaces</option>
                </select>
                <div id="namespace-indicator" class="mt-2 text-xs text-slate-400">
                    <span id="ns-count">0</span> namespaces available
                </div>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 py-2 overflow-y-auto">
                <!-- Overview -->
                <div class="px-3 py-2">
                    <button onclick="navigate('overview')" data-nav="overview"
                        class="sidebar-section w-full text-left px-3 py-2 rounded text-sm font-medium flex items-center gap-2 transition-colors">
                        <i class="fas fa-chart-pie w-4 text-center"></i>
                        <span>Overview</span>
                    </button>
                </div>

                <!-- Workloads -->
                <div class="px-3 py-2">
                    <div class="flex items-center justify-between text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 px-1">
                        <span>Workloads</span>
                        <span id="workloads-badge" class="menu-badge">0</span>
                    </div>
                    <ul class="space-y-0.5">
                        <li><button onclick="navigate('cronjobs')" data-nav="cronjobs"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-clock w-4 text-center text-slate-400"></i>
                                <span>Cron Jobs</span>
                            </button></li>
                        <li><button onclick="navigate('daemonsets')" data-nav="daemonsets"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-server w-4 text-center text-slate-400"></i>
                                <span>Daemon Sets</span>
                            </button></li>
                        <li><button onclick="navigate('deployments')" data-nav="deployments"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-rocket w-4 text-center text-slate-400"></i>
                                <span>Deployments</span>
                            </button></li>
                        <li><button onclick="navigate('jobs')" data-nav="jobs"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-tasks w-4 text-center text-slate-400"></i>
                                <span>Jobs</span>
                            </button></li>
                        <li><button onclick="navigate('pods')" data-nav="pods"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-cube w-4 text-center text-slate-400"></i>
                                <span>Pods</span>
                            </button></li>
                        <li><button onclick="navigate('replicasets')" data-nav="replicasets"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-clone w-4 text-center text-slate-400"></i>
                                <span>Replica Sets</span>
                            </button></li>
                        <li><button onclick="navigate('replicationcontrollers')" data-nav="replicationcontrollers"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-copy w-4 text-center text-slate-400"></i>
                                <span>Replication Controllers</span>
                            </button></li>
                        <li><button onclick="navigate('statefulsets')" data-nav="statefulsets"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-database w-4 text-center text-slate-400"></i>
                                <span>Stateful Sets</span>
                            </button></li>
                    </ul>
                </div>

                <!-- Service -->
                <div class="px-3 py-2">
                    <div class="flex items-center justify-between text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 px-1">
                        <span>Service</span>
                    </div>
                    <ul class="space-y-0.5">
                        <li><button onclick="navigate('ingresses')" data-nav="ingresses"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-globe w-4 text-center text-slate-400"></i>
                                <span>Ingresses</span>
                            </button></li>
                        <li><button onclick="navigate('ingressclasses')" data-nav="ingressclasses"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-sitemap w-4 text-center text-slate-400"></i>
                                <span>Ingress Classes</span>
                            </button></li>
                        <li><button onclick="navigate('networkpolicies')" data-nav="networkpolicies"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-shield-alt w-4 text-center text-slate-400"></i>
                                <span>Network Policies</span>
                            </button></li>
                        <li><button onclick="navigate('services')" data-nav="services"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-network-wired w-4 text-center text-slate-400"></i>
                                <span>Services</span>
                            </button></li>
                    </ul>
                </div>

                <!-- Config and Storage -->
                <div class="px-3 py-2">
                    <div class="flex items-center justify-between text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 px-1">
                        <span>Config and Storage</span>
                    </div>
                    <ul class="space-y-0.5">
                        <li><button onclick="navigate('configmaps')" data-nav="configmaps"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-file-alt w-4 text-center text-slate-400"></i>
                                <span>Config Maps</span>
                            </button></li>
                        <li><button onclick="navigate('horizontalpodautoscalers')" data-nav="horizontalpodautoscalers"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-balance-scale w-4 text-center text-slate-400"></i>
                                <span>HPAs</span>
                            </button></li>
                        <li><button onclick="navigate('persistentvolumeclaims')" data-nav="persistentvolumeclaims"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-hdd w-4 text-center text-slate-400"></i>
                                <span>Persistent Volume Claims</span>
                            </button></li>
                        <li><button onclick="navigate('secrets')" data-nav="secrets"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-key w-4 text-center text-slate-400"></i>
                                <span>Secrets</span>
                            </button></li>
                        <li><button onclick="navigate('serviceaccounts')" data-nav="serviceaccounts"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-user-cog w-4 text-center text-slate-400"></i>
                                <span>Service Accounts</span>
                            </button></li>
                        <li><button onclick="navigate('storageclasses')" data-nav="storageclasses"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-layer-group w-4 text-center text-slate-400"></i>
                                <span>Storage Classes</span>
                            </button></li>
                    </ul>
                </div>

                <!-- Cluster -->
                <div class="px-3 py-2">
                    <div class="flex items-center justify-between text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 px-1">
                        <span>Cluster</span>
                    </div>
                    <ul class="space-y-0.5">
                        <li><button onclick="navigate('clusterrolebindings')" data-nav="clusterrolebindings"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-link w-4 text-center text-slate-400"></i>
                                <span>Cluster Role Bindings</span>
                            </button></li>
                        <li><button onclick="navigate('clusterroles')" data-nav="clusterroles"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-user-shield w-4 text-center text-slate-400"></i>
                                <span>Cluster Roles</span>
                            </button></li>
                        <li><button onclick="navigate('events')" data-nav="events"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-bell w-4 text-center text-slate-400"></i>
                                <span>Events</span>
                            </button></li>
                        <li><button onclick="navigate('namespaces')" data-nav="namespaces"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-folder w-4 text-center text-slate-400"></i>
                                <span>Namespaces</span>
                            </button></li>
                        <li><button onclick="navigate('nodes')" data-nav="nodes"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">
                                <i class="fas fa-server w-4 text-center text-slate-400"></i>
                                <span>Nodes</span>
                            </button></li>
                        <li><button onclick="navigate('persistentvolumes')" data-nav="persistentvolumes"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">

                                <span>Persistent Volumes</span>
                            </button></li>
                        <li><button onclick="navigate('rolebindings')" data-nav="rolebindings"

                                <span>Role Bindings</span>
                            </button></li>
                        <li><button onclick="navigate('roles')" data-nav="roles"
                                class="sidebar-section w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition-colors">

                                <span>Roles</span>
                            </button></li>
                    </ul>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <header class="bg-k8s-blue text-white px-4 py-2 flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <button onclick="toggleSidebar()" class="p-2 hover:bg-k8s-darkblue rounded">
                        <i class="fas fa-bars"></i>
                    </button>
                    <nav id="breadcrumb" class="breadcrumb text-sm flex items-center">
                        <span id="breadcrumb-content">Overview</span>
                    </nav>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="relative">
                        <input type="text" placeholder="Search"
                            class="bg-k8s-darkblue border-none rounded px-4 py-1.5 pl-10 text-sm focus:outline-none focus:ring-2 focus:ring-white/30 w-64">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    </div>
                    <button onclick="toggleTheme()" id="theme-toggle" class="p-2 hover:bg-k8s-darkblue rounded" title="Toggle Theme">
                        <i id="theme-icon" class="fas fa-sun"></i>
                    </button>
                    <button onclick="refreshData()" class="p-2 hover:bg-k8s-darkblue rounded" title="Refresh">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <div id="content" class="flex-1 overflow-y-auto p-6 bg-slate-900">
                <!-- Dynamic content will be loaded here -->
            </div>
        </main>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center">
        <div class="bg-slate-800 rounded-lg shadow-xl w-full max-w-4xl max-h-[90vh] overflow-hidden">
            <div class="flex items-center justify-between p-4 border-b border-slate-700">
                <h2 id="modal-title" class="text-lg font-semibold">Details</h2>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-700 rounded">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modal-content" class="p-4 overflow-y-auto max-h-[calc(90vh-80px)]">
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let currentNamespace = '';
        let currentView = 'overview';
        let eventSource = null;
        let refreshInterval = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadNamespaces();
            navigate('overview');
            // Auto-refresh disabled - use manual refresh button instead
        });

                if (detailName) {
                    html += `<a href="#" onclick="navigate('${view}')">${info.name}</a>`;
                    html += `<span class="breadcrumb-separator">›</span>`;
                    html += `<span class="breadcrumb-current">${detailName}</span>`;

                    html += `<span class="breadcrumb-current">${info.name}</span>`;

        // Namespace handling
        async function loadNamespaces(retryCount = 0) {
            try {
                const res = await fetch(`${API_BASE}/api/namespaces`);
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }
                const data = await res.json();
                const sidebarSelect = document.getElementById('namespace-select');

                sidebarSelect.innerHTML = '<option value="">All namespaces</option>';

                // Sort namespaces alphabetically and add to dropdown
                const namespaces = data.items || [];
                namespaces.sort((a, b) => a.name.localeCompare(b.name));
                namespaces.forEach(ns => {
                    sidebarSelect.innerHTML += `<option value="${ns.name}">${ns.name}</option>`;
                });

                // Update namespace count
                document.getElementById('ns-count').textContent = namespaces.length;

                // Restore current selection if any
                if (currentNamespace) {
                    sidebarSelect.value = currentNamespace;
                }
            } catch (err) {
                console.error('Failed to load namespaces:', err);
                // Retry up to 3 times with increasing delay (cache might not be ready)
                if (retryCount < 3) {
                    setTimeout(() => loadNamespaces(retryCount + 1), 1000 * (retryCount + 1));
                }
            }
        }

            currentNamespace = ns;

            return currentNamespace ? `?namespace=${currentNamespace}` : '';

        function renderCircularChart(label, percent, sublabel, color) {

        // Generic table renderer
        function renderTable(columns, data, actions = null) {
            if (!data || data.length === 0) {
                return `
                    <div class="empty-state">
                        <div class="empty-state-icon"><i class="fas fa-inbox"></i></div>
                        <div class="empty-state-title">No Resources Found</div>
                        <div class="empty-state-message">There are no resources to display in this view.</div>
                    </div>
                `;
            }
            return `
                <div class="table-container">
                    <table class="w-full">
                        <thead class="table-header">
                            <tr>
                                ${columns.map(col => `<th class="text-left">${col.label}</th>`).join('')}
                                ${actions ? '<th class="text-left">Actions</th>' : ''}
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-700">
                            ${data.map(row => `
                                <tr class="hover:bg-slate-700/50">
                                    ${columns.map(col => `<td class="px-4 py-3 text-sm ${col.class || ''}">${col.render ? col.render(row) : row[col.key] || '-'}</td>`).join('')}
                                    ${actions ? `<td class="px-4 py-3 text-sm">${actions(row)}</td>` : ''}
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // Error state renderer
        function renderErrorState(resource, message) {
            return `
                <div class="empty-state">
                    <div class="empty-state-icon"><i class="fas fa-exclamation-triangle" style="color: #f59e0b;"></i></div>
                    <div class="empty-state-title">Unable to Load ${formatViewName(resource)}</div>

                        ${message.includes('Failed to fetch') || message.includes('NetworkError')
                            ? 'Could not connect to the server. Please check your connection and try again.'
                            : 'An error occurred while loading data. Please try refreshing the page.'}

                        <i class="fas fa-redo mr-2"></i>Try Again
                    </button>

            `;
        }

        // Safely get items from API response
        function getItems(data) {
            if (!data) return [];
            if (Array.isArray(data.items)) return data.items;
            if (Array.isArray(data)) return data;
            return [];
        }

        function statusClass(status) {
            const s = (status || '').toLowerCase();
            if (['running', 'ready', 'bound', 'active', 'available'].some(x => s.includes(x))) return 'status-running';
            if (['pending', 'waiting', 'creating'].some(x => s.includes(x))) return 'status-pending';
            if (['failed', 'error', 'crashloop', 'notready'].some(x => s.includes(x))) return 'status-failed';
            if (['succeeded', 'completed'].some(x => s.includes(x))) return 'status-succeeded';
            if (['terminating'].some(x => s.includes(x))) return 'status-terminating';
            return '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;

                        </button>

                        </button>

                        </button>

        function startLogStream() {
            stopLogStream();
            const namespace = document.getElementById('log-namespace').value;
            const pod = document.getElementById('log-pod').value;
            if (!namespace || !pod) {
                alert('Please enter namespace and pod name');
                return;
            }
            const logOutput = document.getElementById('log-output');
            logOutput.innerHTML = '<p class="text-slate-500">Connecting...</p>';

            eventSource = new EventSource(`${API_BASE}/api/logs/${namespace}/${pod}`);
            eventSource.addEventListener('log', (e) => {
                if (logOutput.querySelector('.text-slate-500')) logOutput.innerHTML = '';
                const line = document.createElement('div');
                line.textContent = e.data;
                line.className = 'text-green-400 whitespace-pre';
                logOutput.appendChild(line);
                logOutput.scrollTop = logOutput.scrollHeight;
            });
            eventSource.addEventListener('error', (e) => {
                const line = document.createElement('div');
                line.textContent = e.data || 'Stream error';
                line.className = 'text-red-400';
                logOutput.appendChild(line);
            });
            eventSource.onerror = () => {
                const line = document.createElement('div');
                line.textContent = '[Stream disconnected]';
                line.className = 'text-yellow-400';

        // Generic resource detail viewer
        async function showResourceDetail(resourceType, namespace, name) {
            try {
                let url = `${API_BASE}/api/${resourceType}`;
                if (namespace) {
                    url += `/${namespace}/${name}`;
                } else {
                    url += `/${name}`;
                }

                const data = await fetch(url).then(r => r.json());

                // Update breadcrumb to show detail view
                updateBreadcrumb(resourceType, name);

                document.getElementById('modal-title').textContent = `${formatViewName(resourceType.replace(/s$/, ''))}: ${namespace ? namespace + '/' : ''}${name}`;

                // Build structured content based on resource type
                let structuredContent = '';

                // Roles and ClusterRoles - show rules
                if (resourceType === 'roles' || resourceType === 'clusterroles') {
                    const rules = data.rules || [];
                    structuredContent = `
                        <div class="bg-slate-700 rounded p-4">
                            <h3 class="text-sm font-semibold text-k8s-blue mb-3">Permissions (${rules.length} rules)</h3>
                            ${rules.length > 0 ? `
                            <div class="overflow-x-auto">
                                <table class="w-full text-xs">
                                    <thead><tr class="text-slate-400 border-b border-slate-600">
                                        <th class="text-left p-2">API Groups</th>
                                        <th class="text-left p-2">Resources</th>
                                        <th class="text-left p-2">Verbs</th>
                                        <th class="text-left p-2">Resource Names</th>
                                    </tr></thead>
                                    <tbody>
                                        ${rules.map(rule => `
                                            <tr class="border-b border-slate-600/50">
                                                <td class="p-2"><span class="text-purple-400">${(rule.apiGroups || ['*']).map(g => g || 'core').join(', ')}</span></td>
                                                <td class="p-2"><span class="text-yellow-400">${(rule.resources || ['*']).join(', ')}</span></td>
                                                <td class="p-2">${(rule.verbs || []).map(v => `<span class="px-1 py-0.5 rounded text-xs ${v === '*' ? 'bg-red-600' : 'bg-green-600/50'}">${v}</span>`).join(' ')}</td>
                                                <td class="p-2 text-slate-400">${(rule.resourceNames || []).join(', ') || '-'}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                            ` : '<p class="text-slate-400 text-sm">No rules defined</p>'}
                        </div>
                    `;
                }

                // RoleBindings and ClusterRoleBindings - show roleRef and subjects
                if (resourceType === 'rolebindings' || resourceType === 'clusterrolebindings') {
                    const roleRef = data.roleRef || {};
                    const subjects = data.subjects || [];
                    structuredContent = `
                        <div class="bg-slate-700 rounded p-4">
                            <h3 class="text-sm font-semibold text-k8s-blue mb-3">Role Reference</h3>
                            <div class="grid grid-cols-3 gap-4 text-sm">
                                <div><span class="text-slate-400">Kind:</span> <span class="text-yellow-400">${roleRef.kind || '-'}</span></div>
                                <div><span class="text-slate-400">Name:</span> <span class="text-white">${roleRef.name || '-'}</span></div>
                                <div><span class="text-slate-400">API Group:</span> <span class="text-purple-400">${roleRef.apiGroup || 'rbac.authorization.k8s.io'}</span></div>
                            </div>
                        </div>
                        <div class="bg-slate-700 rounded p-4">
                            <h3 class="text-sm font-semibold text-k8s-blue mb-3">Subjects (${subjects.length})</h3>
                            ${subjects.length > 0 ? `
                            <div class="overflow-x-auto">
                                <table class="w-full text-xs">
                                    <thead><tr class="text-slate-400 border-b border-slate-600">
                                        <th class="text-left p-2">Kind</th>
                                        <th class="text-left p-2">Name</th>
                                        <th class="text-left p-2">Namespace</th>
                                    </tr></thead>
                                    <tbody>
                                        ${subjects.map(subj => `
                                            <tr class="border-b border-slate-600/50">
                                                <td class="p-2"><span class="px-2 py-0.5 rounded text-xs ${subj.kind === 'ServiceAccount' ? 'bg-blue-600/50' : subj.kind === 'User' ? 'bg-green-600/50' : 'bg-purple-600/50'}">${subj.kind}</span></td>
                                                <td class="p-2 text-white">${subj.name}</td>
                                                <td class="p-2 text-slate-400">${subj.namespace || '-'}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                            ` : '<p class="text-slate-400 text-sm">No subjects defined</p>'}
                        </div>
                    `;
                }

                document.getElementById('modal-content').innerHTML = `
                    <div class="space-y-4">
                        <div class="bg-slate-700 rounded p-4">
                            <h3 class="text-sm font-semibold text-k8s-blue mb-2">Metadata</h3>
                            <div class="grid grid-cols-2 gap-2 text-sm">
                                <div><span class="text-slate-400">Name:</span> ${data.metadata?.name || name}</div>
                                ${namespace ? `<div><span class="text-slate-400">Namespace:</span> ${data.metadata?.namespace || namespace}</div>` : ''}
                                <div><span class="text-slate-400">UID:</span> <span class="text-xs">${data.metadata?.uid || '-'}</span></div>
                                <div><span class="text-slate-400">Created:</span> ${data.metadata?.creationTimestamp || '-'}</div>
                            </div>
                        </div>
                        ${structuredContent}
                        ${data.metadata?.labels && Object.keys(data.metadata.labels).length > 0 ? `
                        <div class="bg-slate-700 rounded p-4">
                            <h3 class="text-sm font-semibold text-k8s-blue mb-2">Labels</h3>
                            <div class="flex flex-wrap gap-2">
                                ${Object.entries(data.metadata.labels).map(([k, v]) => `
                                    <span class="px-2 py-1 bg-slate-600 rounded text-xs">${k}: ${v}</span>
                                `).join('')}
                            </div>
                        </div>
                        ` : ''}
                        ${data.metadata?.annotations && Object.keys(data.metadata.annotations).length > 0 ? `
                        <div class="bg-slate-700 rounded p-4">
                            <h3 class="text-sm font-semibold text-k8s-blue mb-2">Annotations</h3>
                            <div class="space-y-1 text-xs">
                                ${Object.entries(data.metadata.annotations).slice(0, 10).map(([k, v]) => `
                                    <div><span class="text-slate-400">${k}:</span> ${String(v).substring(0, 100)}${String(v).length > 100 ? '...' : ''}</div>
                                `).join('')}
                                ${Object.keys(data.metadata.annotations).length > 10 ? `<div class="text-slate-500">... and ${Object.keys(data.metadata.annotations).length - 10} more</div>` : ''}
                            </div>
                        </div>
                        ` : ''}
                    </div>
                `;
                document.getElementById('detail-modal').classList.remove('hidden');
            } catch (err) {
                console.error('Failed to load resource detail:', err);
            }
        }

        // Utilities
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('hidden');
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.add('hidden');
        }

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Close modal on backdrop click
        document.getElementById('detail-modal').addEventListener('click', (e) => {
            if (e.target.id === 'detail-modal') closeModal();
        });

        // Theme toggle
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');

            if (body.classList.contains('light')) {
                body.classList.remove('light');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.add('light');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                localStorage.setItem('theme', 'light');
            }
        }

        // Load saved theme on page load
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light');
                const icon = document.getElementById('theme-icon');
                if (icon) {
                    icon.classList.remove('fa-sun');
                    icon.classList.add('fa-moon');
                }
            }
        })();
    </script>
</body>

</html>
