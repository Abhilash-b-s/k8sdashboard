    <script>
        const API_BASE = '';
        let currentNamespace = '';
        let currentView = 'overview';
        let eventSource = null;
        let refreshInterval = null;
        let currentCluster = '';

        // ============================================
        // Lucide icon swap (replaces Font Awesome at runtime)
        // ============================================
        const FA_TO_LUCIDE = {
            'fa-balance-scale': 'scale', 'fa-bars': 'menu', 'fa-bell': 'bell',
            'fa-chart-pie': 'pie-chart', 'fa-check': 'check', 'fa-clock': 'clock',
            'fa-clone': 'copy', 'fa-cloud-upload-alt': 'cloud-upload', 'fa-cube': 'box',
            'fa-database': 'database', 'fa-edit': 'pencil', 'fa-eraser': 'eraser',
            'fa-exclamation-triangle': 'alert-triangle', 'fa-expand-arrows-alt': 'maximize-2',
            'fa-file-alt': 'file-text', 'fa-file-code': 'file-code', 'fa-folder': 'folder',
            'fa-globe': 'globe', 'fa-hdd': 'hard-drive', 'fa-inbox': 'inbox',
            'fa-key': 'key', 'fa-layer-group': 'layers', 'fa-link': 'link',
            'fa-network-wired': 'network', 'fa-play': 'play', 'fa-plus': 'plus',
            'fa-plus-circle': 'plus-circle', 'fa-redo': 'rotate-ccw', 'fa-rocket': 'rocket',
            'fa-server': 'server', 'fa-shield-alt': 'shield', 'fa-sitemap': 'workflow',
            'fa-spinner': 'loader-2', 'fa-stop': 'square', 'fa-sun': 'sun',
            'fa-sync-alt': 'refresh-cw', 'fa-tasks': 'list-checks', 'fa-times': 'x',
            'fa-trash': 'trash-2', 'fa-user-cog': 'user-cog', 'fa-user-lock': 'lock',
            'fa-user-shield': 'shield-check', 'fa-user-tag': 'tag', 'fa-search': 'search',
            'fa-moon': 'moon'
        };

        function swapFaIcons(root) {
            if (!window.lucide) return;
            const scope = root || document;
            const els = scope.querySelectorAll('i.fas, i.far, i.fab, i.fa');
            els.forEach(el => {
                const faName = Array.from(el.classList).find(c => c.startsWith('fa-') && !['fa-spin','fa-2x','fa-3x','fa-4x','fa-fw'].includes(c));
                const name = FA_TO_LUCIDE[faName] || 'square';
                const preserved = Array.from(el.classList).filter(c => !c.startsWith('fa') && c !== 'fa');
                if (el.classList.contains('fa-spin')) preserved.push('animate-spin');
                if (el.classList.contains('fa-3x')) preserved.push('text-4xl');
                else if (el.classList.contains('fa-2x')) preserved.push('text-2xl');
                el.removeAttribute('class');
                preserved.forEach(c => el.classList.add(c));
                el.setAttribute('data-lucide', name);
            });
            // Only run createIcons when there are <i data-lucide> elements
            // pending. Lucide itself selects `[data-lucide]`, which also
            // matches the SVGs it just produced (they keep the attribute);
            // calling it unconditionally turns the MutationObserver below
            // into an infinite icon-replace loop, which destroys click
            // targets every animation frame and breaks action-column
            // buttons.
            if (scope.querySelector('i[data-lucide]')) {
                window.lucide.createIcons({ attrs: { 'stroke-width': 1.75 } });
            }
        }

        let _iconSwapPending = false;
        function scheduleIconSwap() {
            if (_iconSwapPending) return;
            _iconSwapPending = true;
            requestAnimationFrame(() => {
                _iconSwapPending = false;
                swapFaIcons();
            });
        }
        new MutationObserver(scheduleIconSwap).observe(document.body, { childList: true, subtree: true });

        // Initial swap (MutationObserver only catches future changes)
        function _initialIconSwap() {
            if (window.lucide) { swapFaIcons(); return; }
            setTimeout(_initialIconSwap, 30);
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', _initialIconSwap);
        } else {
            _initialIconSwap();
        }

        // ============================================
        // Skeleton loader helpers
        // ============================================
        function skeletonTable(cols = 5, rows = 8) {
            const widths = ['80%', '60%', '70%', '50%', '40%', '65%', '55%', '75%'];
            const head = Array(cols).fill(0).map((_, i) =>
                `<th class="text-left px-4 py-3"><span class="skeleton inline-block" style="width:${widths[i % widths.length]};height:0.7rem">x</span></th>`
            ).join('');
            const body = Array(rows).fill(0).map(() =>
                `<tr class="border-t border-slate-700/40"><td colspan="${cols}" class="px-4 py-3"><span class="skeleton block" style="height:0.85rem;width:${60 + Math.random() * 35}%">x</span></td></tr>`
            ).join('');
            return `<div class="bg-slate-800 rounded-lg border border-slate-700"><div class="table-container"><table class="w-full"><thead class="table-header"><tr>${head}</tr></thead><tbody>${body}</tbody></table></div></div>`;
        }

        function skeletonCard() {
            return `<div class="space-y-3"><span class="skeleton block" style="width:30%;height:1.5rem"></span><span class="skeleton block" style="width:90%;height:0.85rem"></span><span class="skeleton block" style="width:70%;height:0.85rem"></span><span class="skeleton block" style="width:80%;height:0.85rem"></span></div>`;
        }

        // ============================================
        // Command palette (Cmd/Ctrl+K)
        // ============================================
        const PALETTE_NAV = [
            { kind: 'view', label: 'Overview', view: 'overview', icon: 'pie-chart' },
            { kind: 'view', label: 'Pods', view: 'pods', icon: 'box' },
            { kind: 'view', label: 'Deployments', view: 'deployments', icon: 'rocket' },
            { kind: 'view', label: 'StatefulSets', view: 'statefulsets', icon: 'database' },
            { kind: 'view', label: 'DaemonSets', view: 'daemonsets', icon: 'server' },
            { kind: 'view', label: 'ReplicaSets', view: 'replicasets', icon: 'copy' },
            { kind: 'view', label: 'Jobs', view: 'jobs', icon: 'list-checks' },
            { kind: 'view', label: 'CronJobs', view: 'cronjobs', icon: 'clock' },
            { kind: 'view', label: 'Services', view: 'services', icon: 'network' },
            { kind: 'view', label: 'Ingresses', view: 'ingresses', icon: 'globe' },
            { kind: 'view', label: 'IngressClasses', view: 'ingressclasses', icon: 'workflow' },
            { kind: 'view', label: 'NetworkPolicies', view: 'networkpolicies', icon: 'shield' },
            { kind: 'view', label: 'ConfigMaps', view: 'configmaps', icon: 'file-text' },
            { kind: 'view', label: 'Secrets', view: 'secrets', icon: 'key' },
            { kind: 'view', label: 'PersistentVolumeClaims', view: 'persistentvolumeclaims', icon: 'hard-drive' },
            { kind: 'view', label: 'PersistentVolumes', view: 'persistentvolumes', icon: 'database' },
            { kind: 'view', label: 'StorageClasses', view: 'storageclasses', icon: 'layers' },
            { kind: 'view', label: 'Longhorn Volumes', view: 'longhornvolumes', icon: 'hard-drive' },
            { kind: 'view', label: 'ServiceAccounts', view: 'serviceaccounts', icon: 'user-cog' },
            { kind: 'view', label: 'HPAs', view: 'horizontalpodautoscalers', icon: 'scale' },
            { kind: 'view', label: 'Nodes', view: 'nodes', icon: 'server' },
            { kind: 'view', label: 'Namespaces', view: 'namespaces', icon: 'folder' },
            { kind: 'view', label: 'Events', view: 'events', icon: 'bell' },
            { kind: 'view', label: 'Roles', view: 'roles', icon: 'lock' },
            { kind: 'view', label: 'RoleBindings', view: 'rolebindings', icon: 'tag' },
            { kind: 'view', label: 'ClusterRoles', view: 'clusterroles', icon: 'shield-check' },
            { kind: 'view', label: 'ClusterRoleBindings', view: 'clusterrolebindings', icon: 'link' },
        ];
        let paletteActiveIdx = 0;
        let paletteFiltered = [];

        function openPalette() {
            const el = document.getElementById('command-palette');
            const input = document.getElementById('palette-input');
            el.classList.remove('hidden');
            input.value = '';

        function closePalette() {
            document.getElementById('command-palette').classList.add('hidden');
        }
        function paletteCandidates() {
            const items = [...PALETTE_NAV];
            (window._availableClusters || []).forEach(c => items.push({ kind: 'cluster', label: c, icon: 'server', cluster: c }));
            (window._availableNamespaces || []).forEach(n => items.push({ kind: 'namespace', label: n, icon: 'folder', namespace: n }));
            return items;
        }
        function renderPalette(query) {
            const list = document.getElementById('palette-list');
            const q = (query || '').toLowerCase().trim();
            const all = paletteCandidates();
            paletteFiltered = q ? all.filter(it => it.label.toLowerCase().includes(q)) : all;
            paletteActiveIdx = 0;
            if (!paletteFiltered.length) {
                list.innerHTML = `<div class="palette-item" style="cursor:default;color:#64748b">No matches</div>`;
                return;
            }
            list.innerHTML = paletteFiltered.slice(0, 50).map((it, i) => `
                <div class="palette-item ${i === 0 ? 'active' : ''}" data-idx="${i}" onclick="selectPalette(${i})">
                    <i data-lucide="${it.icon || 'square'}"></i>
                    <span>${it.label}</span>
                    <span class="palette-kind">${it.kind}</span>
                </div>
            `).join('');
            if (window.lucide) window.lucide.createIcons({ attrs: { 'stroke-width': 1.75 } });
        }
        function movePalette(delta) {
            const items = document.querySelectorAll('#palette-list .palette-item[data-idx]');
            if (!items.length) return;
            paletteActiveIdx = (paletteActiveIdx + delta + items.length) % items.length;
            items.forEach(el => el.classList.remove('active'));
            items[paletteActiveIdx].classList.add('active');
            items[paletteActiveIdx].scrollIntoView({ block: 'nearest' });
        }
        function selectPalette(idx) {
            const it = paletteFiltered[idx];
            if (!it) return;
            closePalette();
            if (it.kind === 'view') navigate(it.view);
            else if (it.kind === 'cluster') changeCluster(it.cluster);
            else if (it.kind === 'namespace') { changeNamespace(it.namespace); }
        }

        document.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
                e.preventDefault();
                const palette = document.getElementById('command-palette');
                if (palette.classList.contains('hidden')) openPalette(); else closePalette();
                return;
            }
            const palette = document.getElementById('command-palette');
            if (!palette.classList.contains('hidden')) {
                if (e.key === 'Escape') { e.preventDefault(); closePalette(); }
                else if (e.key === 'ArrowDown') { e.preventDefault(); movePalette(1); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); movePalette(-1); }
                else if (e.key === 'Enter') { e.preventDefault(); selectPalette(paletteActiveIdx); }
                return;
            }
            if (e.key === 'Escape') {
                const m = document.getElementById('detail-modal');
                if (m && !m.classList.contains('hidden')) closeModal();
            }
        });
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('palette-input');
            if (input) input.addEventListener('input', e => renderPalette(e.target.value));
            const palette = document.getElementById('command-palette');

        function setupDragAndDrop() {
            const dropZone = document.getElementById('drop-zone');
            const dropLabel = document.getElementById('drop-label');

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => {
                    dropLabel.classList.add('border-k8s-blue', 'bg-slate-600/50');
                }, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => {
                    dropLabel.classList.remove('border-k8s-blue', 'bg-slate-600/50');
                }, false);
            });

            dropZone.addEventListener('drop', (e) => {
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFile(files[0]);
                }
            }, false);
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {

            const reader = new FileReader();
            reader.onload = (e) => {
                kubeconfigContent = e.target.result;
                document.getElementById('file-name').textContent = file.name;
                document.getElementById('file-info').classList.remove('hidden');
                document.getElementById('drop-label').classList.add('hidden');

            reader.readAsText(file);

        async function previewKubeconfig() {
            if (!kubeconfigContent) {
                alert('Please select a kubeconfig file');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/api/kubeconfig/upload/preview`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: kubeconfigContent })
                });
                const data = await res.json();

                if (!res.ok) {
                    document.getElementById('import-result').innerHTML = `<span class="text-red-400">${data.error}</span>`;
                    document.getElementById('import-result').classList.remove('hidden');
                    return;
                }

                const contexts = data.contexts || [];
                // Store context mappings for import
                window.kubeconfigContexts = contexts.filter(ctx => !ctx.imported).map(ctx => ({
                    original: ctx.name,
                    customName: ctx.name
                }));

                document.getElementById('contexts-list').innerHTML = contexts.map((ctx, idx) => `
                    <div class="px-3 py-2 border-b border-slate-700 last:border-0">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-xs text-slate-400">Context: ${ctx.name}</span>
                            ${ctx.imported
                                ? '<span class="text-xs text-green-400"><i class="fas fa-check mr-1"></i>Already imported</span>'
                                : '<span class="text-xs text-k8s-blue">New</span>'}
                        </div>
                        ${!ctx.imported ? `
                            <input type="text"
                                id="cluster-name-${idx}"
                                value="${ctx.name}"
                                onchange="updateClusterName(${idx}, this.value)"
                                class="w-full px-2 py-1 bg-slate-800 border border-slate-600 rounded text-sm text-white focus:border-k8s-blue focus:outline-none"
                                placeholder="Enter cluster name">
                        ` : ''}
                    </div>
                `).join('');

                document.getElementById('preview-section').classList.remove('hidden');
                document.getElementById('import-result').classList.add('hidden');
                document.getElementById('preview-btn').classList.add('hidden');
                document.getElementById('import-btn').classList.remove('hidden');
            } catch (err) {
                document.getElementById('import-result').innerHTML = `<span class="text-red-400">Error: ${err.message}</span>`;
                document.getElementById('import-result').classList.remove('hidden');
            }
        }

        function updateClusterName(idx, name) {
            if (window.kubeconfigContexts && window.kubeconfigContexts[idx]) {
                window.kubeconfigContexts[idx].customName = name;
            }
        }

        async function importKubeconfig() {
            if (!kubeconfigContent) return;

            // Build name mappings from custom names
            const nameMapping = {};
            if (window.kubeconfigContexts) {
                window.kubeconfigContexts.forEach(ctx => {
                    if (ctx.customName && ctx.customName !== ctx.original) {
                        nameMapping[ctx.original] = ctx.customName;
                    }
                });
            }

            try {
                const res = await fetch(`${API_BASE}/api/kubeconfig/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: kubeconfigContent,
                        nameMapping: nameMapping
                    })
                });
                const data = await res.json();

                if (!res.ok) {
                    document.getElementById('import-result').innerHTML = `<span class="text-red-400">${data.error}</span>`;
                    document.getElementById('import-result').classList.remove('hidden', 'bg-green-900/30');
                    document.getElementById('import-result').classList.add('bg-red-900/30');
                    return;
                }

                const added = data.addedClusters || [];
                const failed = data.failedClusters || [];

                let msg = '';
                if (added.length > 0) {
                    msg += `<span class="text-green-400"><i class="fas fa-check mr-1"></i>Added: ${added.join(', ')}</span>`;
                }
                if (failed.length > 0) {
                    msg += `<br><span class="text-red-400"><i class="fas fa-times mr-1"></i>Failed: ${failed.join(', ')}</span>`;
                }
                if (added.length === 0 && failed.length === 0) {
                    msg = '<span class="text-yellow-400">No new clusters to import</span>';
                }

                document.getElementById('import-result').innerHTML = msg;
                document.getElementById('import-result').classList.remove('hidden', 'bg-red-900/30');
                document.getElementById('import-result').classList.add('bg-green-900/30');
                document.getElementById('import-btn').classList.add('hidden');

                // Show Done button, hide Cancel after successful import
                if (added.length > 0) {
                    document.getElementById('cancel-btn').classList.add('hidden');
                    document.getElementById('preview-btn').classList.add('hidden');
                    document.getElementById('done-btn').classList.remove('hidden');

                    // Set the newly added cluster as current and refresh
                    currentCluster = added[0];
                }

                // Refresh clusters list and namespaces
                await loadClusters();
                if (currentCluster) {
                    document.getElementById('cluster-select').value = currentCluster;
                    await loadNamespaces();
                }
            } catch (err) {
                document.getElementById('import-result').innerHTML = `<span class="text-red-400">Error: ${err.message}</span>`;
                document.getElementById('import-result').classList.remove('hidden');
            }
        }

        // Namespace handling
        async function loadNamespaces(retryCount = 0) {
            if (!currentCluster) {
                console.log('No cluster selected, skipping namespace load');
                return;
            }
            try {
                const res = await fetch(`${getClusterAPI()}/namespaces`);
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }
                const data = await res.json();
                const sidebarSelect = document.getElementById('namespace-select');

                sidebarSelect.innerHTML = '<option value="">All namespaces</option>';

                // Sort namespaces alphabetically and add to dropdown
                const namespaces = data.items || [];
                namespaces.sort((a, b) => a.name.localeCompare(b.name));
                namespaces.forEach(ns => {
                    sidebarSelect.innerHTML += `<option value="${ns.name}">${ns.name}</option>`;
                });

                // Update namespace count
                document.getElementById('ns-count').textContent = namespaces.length;
                window._availableNamespaces = namespaces.map(n => n.name);

                // Restore current selection if any
                if (currentNamespace) {
                    sidebarSelect.value = currentNamespace;
                }
            } catch (err) {
                console.error('Failed to load namespaces:', err);
                // Retry up to 3 times with increasing delay (cache might not be ready)
                if (retryCount < 3) {
                    setTimeout(() => loadNamespaces(retryCount + 1), 1000 * (retryCount + 1));
                }
            }
        }

        // Generic table renderer
        function renderTable(columns, data, actions = null) {
            if (!data || data.length === 0) {
                return `

                        <div class="empty-state-title">No Resources Found</div>

            }
            return `

                        <thead class="table-header">

                                    ${actions ? `<td class="px-4 py-3 text-sm">${actions(row)}</td>` : ''}

        // Error state renderer
        function renderErrorState(resource, message) {
            return `
                <div class="empty-state">
                    <div class="empty-state-icon"><i class="fas fa-exclamation-triangle" style="color: #f59e0b;"></i></div>

                        ${message.includes('Failed to fetch') || message.includes('NetworkError')

        // Safely get items from API response
        function getItems(data) {
            if (!data) return [];
            let items = [];
            if (Array.isArray(data.items)) items = data.items;
            else if (Array.isArray(data)) items = data;
            else return [];

            // Sort by namespace, then by name
            return items.sort((a, b) => {
                const nsA = (a.namespace || '').toLowerCase();
                const nsB = (b.namespace || '').toLowerCase();
                if (nsA !== nsB) return nsA.localeCompare(nsB);
                const nameA = (a.name || '').toLowerCase();
                const nameB = (b.name || '').toLowerCase();
                return nameA.localeCompare(nameB);
            });
        }

        // Map a Kubernetes-derived status string to a distinct CSS class.
        // Match exact tokens (not substrings) so e.g. "CrashLoopBackOff" gets
        // its own pill and doesn't collapse into a generic "failed" bucket.
        function statusClass(status) {
            const s = (status || '').toLowerCase().trim();
            // Healthy / running — green
            if (s === 'running' || s === 'ready' || s === 'bound' || s === 'active' || s === 'available' ||
                s === 'attached' || s === 'healthy') return 'status-running';
            // Successfully completed — blue
            if (s === 'succeeded' || s === 'completed') return 'status-succeeded';
            // Waiting to schedule — yellow
            if (s === 'pending') return 'status-pending';
            // Coming up (containers being created or pod initializing) — cyan
            if (s === 'containercreating' || s === 'podinitializing' || s.startsWith('init:')) return 'status-creating';
            // Longhorn volume transitions — cyan
            if (s === 'attaching' || s === 'detaching' || s === 'creating' || s === 'deleting') return 'status-creating';
            // Longhorn detached (idle) — slate (informational, not an error)
            if (s === 'detached') return 'status-unknown';
            // Graceful shutdown — orange
            if (s === 'terminating') return 'status-terminating';
            // Image / config problems — amber (recoverable but stuck)
            if (s === 'imagepullbackoff' || s === 'errimagepull' || s === 'invalidimagename' ||
                s === 'createcontainerconfigerror' || s === 'createcontainererror') return 'status-imageerror';
            // Crash-looping container — red
            if (s === 'crashloopbackoff') return 'status-crashloop';
            // OOM-killed — deep red
            if (s === 'oomkilled') return 'status-oomkilled';
            // Pod-Ready condition is False but containers are running — rose
            // Longhorn "degraded" (replica missing but volume usable) — same bucket
            if (s === 'notready' || s === 'degraded') return 'status-notready';
            // Longhorn "faulted" — acute failure
            if (s === 'faulted') return 'status-failed';
            // Generic errors / non-zero exits — red
            if (s === 'failed' || s === 'error' || s.startsWith('exitcode:') || s.startsWith('signal:') ||
                s === 'rundockererror' || s === 'startup probefailed') return 'status-failed';
            // Unknown / NodeLost — slate
            if (s === 'unknown' || s === 'nodelost') return 'status-unknown';
            // Anything else — slate (still rendered as a pill, not bare text)
            return 'status-unknown';
        }

        // Optional Lucide icon shown inside the pill for "in-progress" states.
        // Healthy / terminal states keep the simple colored dot.
        function statusIcon(status) {
            const s = (status || '').toLowerCase().trim();
            if (s.startsWith('init:')) return 'loader-2';
            if (s === 'containercreating' || s === 'podinitializing') return 'loader-2';
            if (s === 'pending') return 'loader-2';
            if (s === 'terminating') return 'circle-dashed';
            return null;
        }

        // statusPillHTML builds the full pill markup including the optional
        // spinning icon. Use this everywhere a status is rendered.
        function statusPillHTML(status) {
            const text = status || '';
            const cls = statusClass(text);
            const icon = statusIcon(text);
            if (icon) {
                return `<span class="${cls} has-icon"><i data-lucide="${icon}" class="status-spin"></i>${text}</span>`;
            }
            return `<span class="${cls}">${text}</span>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===========================================================
        // Generic live-table backed by the SSE watch endpoint.
        //   liveTable.open({ kind, title, columns, actions, ... })
        // Manages: scaffold render, SSE stream, snapshot/add/update/delete
        // events, periodic reconcile, namespace filtering, and cleanup on
        // navigate.
        // ===========================================================
        const liveTable = {
            es: null,
            resyncTimer: null,
            cfg: null,
            rowsByKey: new Map(),
            tableId: 'live-table',
            countId: 'live-count',
            liveId: 'live-status',

            open(cfg) {
                this.close();
                this.cfg = cfg;
                this.rowsByKey = new Map();
                this._renderScaffold();
                if (!currentCluster) return;
                this._setStatus('connecting');

                // Fallback to REST if SSE doesn't deliver in 3s.
                const fallbackTimer = setTimeout(async () => {
                    if (this.rowsByKey.size === 0) {
                        try {
                            const data = await fetch(`${getClusterAPI()}/${cfg.restPath || cfg.kind}`).then(r => r.json());
                            const items = getItems(data);
                            items.forEach(r => this.rowsByKey.set(this._keyOf(r), r));
                            this._renderAll();
                        } catch (_) {}
                    }
                }, 3000);

                this.es = new EventSource(`${getClusterAPI()}/watch/${cfg.kind}`);
                this.es.addEventListener('snapshot', (e) => {
                    clearTimeout(fallbackTimer);
                    this._setStatus('live');
                    const rows = JSON.parse(e.data);
                    this.rowsByKey = new Map(rows.map(r => [this._keyOf(r), r]));
                    this._renderAll();
                });
                const onChange = (type) => (e) => {
                    this._setStatus('live');
                    const ev = JSON.parse(e.data);
                    if (type === 'delete') {
                        if (ev.key) this._remove(ev.key);
                    } else if (ev.row) {
                        this._upsert(ev.row);
                    }
                };
                this.es.addEventListener('add', onChange('add'));
                this.es.addEventListener('update', onChange('update'));
                this.es.addEventListener('delete', onChange('delete'));
                this.es.addEventListener('ping', () => this._setStatus('live'));
                this.es.onerror = () => { this._setStatus('reconnecting'); this._resync(); };

                this.resyncTimer = setInterval(() => this._resync(), 10000);
            },

            close() {
                if (this.es) { this.es.close(); this.es = null; }
                if (this.resyncTimer) { clearInterval(this.resyncTimer); this.resyncTimer = null; }
                this.cfg = null;
                this.rowsByKey = new Map();
            },

            // Optimistic delete used by deletePod/deleteDeployment etc.
            removeRow(key) { this._remove(key); },

            _keyOf(r) { return `${r.namespace || ''}/${r.name || ''}`; },

            _passesFilter(r) {
                if (!this.cfg.namespaceFilter) return true;
                return !currentNamespace || r.namespace === currentNamespace;
            },

            _sort(a, b) {
                const ns = (a.namespace || '').localeCompare(b.namespace || '');
                return ns !== 0 ? ns : (a.name || '').localeCompare(b.name || '');
            },

            _renderScaffold() {
                const cfg = this.cfg;
                const content = document.getElementById('content');
                const headers = cfg.columns.map(c => `<th class="text-left">${c.label}</th>`).join('') + (cfg.actions ? '<th class="text-left">Actions</th>' : '');
                content.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <h1 class="text-xl font-bold">${cfg.title}</h1>
                            <span id="${this.liveId}" class="text-xs text-yellow-400 flex items-center"><span class="inline-block w-2 h-2 rounded-full bg-yellow-400 mr-1.5 align-middle"></span>Connecting…</span>
                        </div>
                        <span id="${this.countId}" class="text-sm text-slate-400">…</span>
                    </div>
                    <div id="${this.tableId}" class="bg-slate-800 rounded-lg border border-slate-700">
                        <div class="table-container">
                            <table class="w-full">
                                <thead class="table-header"><tr>${headers}</tr></thead>
                                <tbody class="divide-y divide-slate-700"></tbody>
                            </table>
                        </div>
                    </div>
                `;
            },

            _rowHTML(r) {
                const cells = this.cfg.columns.map(c => `<td class="px-4 py-3 text-sm ${c.class || ''}">${c.render ? c.render(r) : (r[c.key] ?? '')}</td>`).join('');
                const actions = this.cfg.actions ? `<td class="px-4 py-3 text-sm">${this.cfg.actions(r)}</td>` : '';
                return cells + actions;
            },

            _renderAll() {
                const tbody = document.querySelector(`#${this.tableId} tbody`);
                if (!tbody) return;
                const rows = [...this.rowsByKey.values()].filter(r => this._passesFilter(r)).sort((a, b) => this._sort(a, b));
                tbody.innerHTML = rows.map(r => `<tr data-key="${this._keyOf(r)}" class="hover:bg-slate-700/50">${this._rowHTML(r)}</tr>`).join('');
                this._updateCount(rows.length);
            },

            _upsert(r) {
                const key = this._keyOf(r);
                this.rowsByKey.set(key, r);
                const tbody = document.querySelector(`#${this.tableId} tbody`);
                if (!tbody) return;
                if (!this._passesFilter(r)) {
                    const existing = tbody.querySelector(`tr[data-key="${CSS.escape(key)}"]`);
                    if (existing) { existing.remove(); this._updateCount(tbody.children.length); }
                    return;
                }
                let tr = tbody.querySelector(`tr[data-key="${CSS.escape(key)}"]`);
                if (tr) {
                    tr.innerHTML = this._rowHTML(r);
                    tr.classList.add('bg-yellow-500/10');
                    setTimeout(() => tr && tr.classList.remove('bg-yellow-500/10'), 600);
                } else {
                    tr = document.createElement('tr');
                    tr.setAttribute('data-key', key);
                    tr.className = 'hover:bg-slate-700/50';
                    tr.innerHTML = this._rowHTML(r);
                    // Insert at the correct sorted position rather than appending.
                    // Walk existing rows; insert before the first one that
                    // sorts after the new row.
                    let inserted = false;
                    for (const child of tbody.children) {
                        const childKey = child.getAttribute('data-key');
                        const childRow = this.rowsByKey.get(childKey);
                        if (!childRow) continue;
                        if (this._sort(r, childRow) < 0) {
                            tbody.insertBefore(tr, child);
                            inserted = true;
                            break;
                        }
                    }
                    if (!inserted) tbody.appendChild(tr);
                    // Briefly highlight the new row so the eye catches it.
                    tr.classList.add('bg-green-500/10');
                    setTimeout(() => tr && tr.classList.remove('bg-green-500/10'), 800);
                    this._updateCount(tbody.children.length);
                }
            },

            _remove(key) {
                this.rowsByKey.delete(key);
                const tbody = document.querySelector(`#${this.tableId} tbody`);
                if (!tbody) return;
                const tr = tbody.querySelector(`tr[data-key="${CSS.escape(key)}"]`);
                if (tr) { tr.remove(); this._updateCount(tbody.children.length); }
            },

            _updateCount(n) {
                const el = document.getElementById(this.countId);
                if (el) el.textContent = `${n} total`;
            },

            _setStatus(s) {
                const el = document.getElementById(this.liveId);
                if (!el) return;
                if (s === 'live') {
                    el.innerHTML = '<span class="inline-block w-2 h-2 rounded-full bg-green-400 mr-1.5 align-middle animate-pulse"></span>Live';
                    el.className = 'text-xs text-green-400 flex items-center';
                } else if (s === 'connecting') {
                    el.innerHTML = '<span class="inline-block w-2 h-2 rounded-full bg-yellow-400 mr-1.5 align-middle"></span>Connecting…';
                    el.className = 'text-xs text-yellow-400 flex items-center';
                } else {
                    el.innerHTML = '<span class="inline-block w-2 h-2 rounded-full bg-red-400 mr-1.5 align-middle"></span>Reconnecting…';
                    el.className = 'text-xs text-red-400 flex items-center';
                }
            },

            async _resync() {
                if (!this.cfg || !currentCluster) return;
                try {
                    const data = await fetch(`${getClusterAPI()}/${this.cfg.restPath || this.cfg.kind}`).then(r => r.json());
                    const items = getItems(data);
                    const newKeys = new Set(items.map(r => this._keyOf(r)));
                    for (const r of items) {
                        const key = this._keyOf(r);
                        const cur = this.rowsByKey.get(key);
                        if (!cur || JSON.stringify(cur) !== JSON.stringify(r)) this._upsert(r);
                    }
                    for (const key of [...this.rowsByKey.keys()]) {
                        if (!newKeys.has(key)) this._remove(key);
                    }
                } catch (_) {}
            },
        };

        async function deletePod(namespace, name) {
            if (!confirm(`Delete pod "${name}" in namespace "${namespace}"?`)) return;
            try {
                await fetch(`${getClusterAPI()}/pods/${namespace}/${name}`, { method: 'DELETE' });
                // If on the live pods view, just remove the row optimistically.
                // The SSE 'delete' event confirms it, and the replacement pod

                // EventSource (refreshCurrentView re-opens it and can race
                // with the add event for the new pod).
                if (currentView === 'pods' && liveTable.es) {
                    liveTable.removeRow(`${namespace}/${name}`);
                } else {
                    refreshCurrentView();
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        async function editResourceYaml(kind, namespace, name) {
            // Cluster-scoped resources pass null/empty namespace; encode as
            // "_" placeholder so URL has a stable shape.
            const ns = namespace || '_';
            const display = kind.charAt(0).toUpperCase() + kind.slice(1).replace(/s$/, '');
            const titleSuffix = namespace ? `${namespace}/${name}` : name;
            document.getElementById('modal-title').textContent = `Edit ${display}: ${titleSuffix}`;
            // Fixed-height editor + sticky footer so the Save button is always
            // reachable regardless of YAML length. modal-content itself can
            // still scroll if the viewport is very short.
            document.getElementById('modal-content').innerHTML = `
                <div class="space-y-3">
                    <div class="text-xs text-slate-400 flex items-center gap-2">
                        <i class="fas fa-file-code"></i>
                        <span>Editing live YAML — Save sends a Kubernetes Update.</span>
                    </div>
                    <div id="yaml-editor-container"
                         class="rounded border border-slate-700 overflow-hidden bg-slate-900"
                         style="height: calc(100vh - 220px); min-height: 280px;">
                        <div class="p-3 text-sm text-slate-400"><i class="fas fa-spinner fa-spin mr-2"></i>Loading YAML...</div>
                    </div>
                    <div id="yaml-editor-error" class="hidden px-3 py-2 rounded text-sm bg-red-900/40 border border-red-700 text-red-200 whitespace-pre-wrap mono"></div>
                </div>
                <div class="sticky bottom-0 left-0 right-0 -mx-4 -mb-4 mt-4 px-4 py-3 bg-slate-800 border-t border-slate-700 flex items-center justify-end gap-2">
                    <button onclick="closeModal()" class="px-4 py-2 bg-slate-600 hover:bg-slate-500 rounded text-sm">Cancel</button>
                    <button id="yaml-save-btn" onclick="saveResourceYaml('${kind}', '${ns}', '${name}')" class="px-4 py-2 bg-green-600 hover:bg-green-500 rounded text-sm">
                        <i class="fas fa-check mr-1"></i>Save
                    </button>
                </div>
            `;
            document.getElementById('detail-modal').classList.remove('hidden');

            try {
                if (typeof window.loadCodeMirror !== 'function') {
                    throw new Error('Editor not loaded yet — refresh the page');
                }
                const [yamlRes, cm] = await Promise.all([
                    fetch(`${getClusterAPI()}/yaml/${kind}/${ns}/${name}`),
                    window.loadCodeMirror()
                ]);
                if (!yamlRes.ok) {
                    let detail = `HTTP ${yamlRes.status}`;
                    try { const j = await yamlRes.json(); detail = j.details || j.error || detail; } catch (_) {}
                    throw new Error(detail);
                }
                const yamlText = await yamlRes.text();
                const container = document.getElementById('yaml-editor-container');
                if (!container) return; // user closed during load
                container.innerHTML = '';
                if (window._yamlEditor) { window._yamlEditor.destroy(); window._yamlEditor = null; }
                window._yamlEditor = new cm.EditorView({
                    parent: container,
                    doc: yamlText,
                    extensions: [cm.basicSetup, cm.yaml(), cm.oneDark]
                });
            } catch (err) {
                showYamlError(`Failed to load YAML: ${err.message}`);
            }
        }

        function showYamlError(msg) {
            const errBox = document.getElementById('yaml-editor-error');
            if (!errBox) return;
            errBox.classList.remove('hidden');
            errBox.textContent = msg;
        }

        async function saveResourceYaml(kind, namespace, name) {
            if (!window._yamlEditor) return;
            const yamlText = window._yamlEditor.state.doc.toString();
            const errBox = document.getElementById('yaml-editor-error');
            const saveBtn = document.getElementById('yaml-save-btn');
            if (errBox) errBox.classList.add('hidden');
            if (saveBtn) saveBtn.disabled = true;

            try {
                const res = await fetch(`${getClusterAPI()}/yaml/${kind}/${namespace}/${name}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/yaml' },
                    body: yamlText
                });
                if (!res.ok) {
                    const j = await res.json().catch(() => ({}));
                    throw new Error(j.details || j.error || `HTTP ${res.status}`);
                }
                if (window._yamlEditor) { window._yamlEditor.destroy(); window._yamlEditor = null; }
                closeModal();
                refreshCurrentView();
            } catch (err) {
                showYamlError(`Save failed: ${err.message}`);
                if (saveBtn) saveBtn.disabled = false;
            }
        }

        function startLogStream() {
            stopLogStream();

                alert('Please enter namespace and pod name');
                return;

            const logOutput = document.getElementById('log-output');
            logOutput.innerHTML = '<p class="text-slate-500">Connecting...</p>';

            eventSource = new EventSource(`${getClusterAPI()}/logs/${namespace}/${pod}`);
            eventSource.addEventListener('log', (e) => {
                if (logOutput.querySelector('.text-slate-500')) logOutput.innerHTML = '';
                const line = document.createElement('div');
                line.textContent = e.data;
                line.className = 'text-green-400 whitespace-pre';
                logOutput.appendChild(line);
                logOutput.scrollTop = logOutput.scrollHeight;
            });
            eventSource.addEventListener('error', (e) => {
                const line = document.createElement('div');
                line.textContent = e.data || 'Stream error';
                line.className = 'text-red-400';
                logOutput.appendChild(line);
            });
            eventSource.onerror = () => {
                const line = document.createElement('div');
                line.textContent = '[Stream disconnected]';
                line.className = 'text-yellow-400';
                logOutput.appendChild(line);
            };
        }

            try {
                const data = await fetch(`${getClusterAPI()}/events${getNamespaceParam()}`).then(r => r.json());
                content.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <h1 class="text-xl font-bold">Events</h1>
                        <span class="text-sm text-slate-400">${getItems(data).length} total</span>
                    </div>
                    <div class="bg-slate-800 rounded-lg border border-slate-700">
                        ${renderTable([
                    { label: 'Type', key: 'type', render: r => `<span class="${r.type === 'Warning' ? 'text-yellow-400' : 'text-green-400'}">${r.type}</span>` },
                    { label: 'Reason', key: 'reason' },
                    { label: 'Object', key: 'involvedObject', class: 'text-k8s-blue' },
                    { label: 'Message', key: 'message', class: 'text-slate-400 text-xs' },
                    { label: 'Count', key: 'count' },
                    { label: 'Last Seen', key: 'lastSeen', class: 'text-slate-400' }
                ], getItems(data))}
                    </div>
                `;
            } catch (err) {
                content.innerHTML = renderErrorState(currentView, err.message);
            }
        }

        // Generic resource detail viewer
        async function showResourceDetail(resourceType, namespace, name) {
            try {
                let url = `${getClusterAPI()}/${resourceType}`;
                if (namespace) {
                    url += `/${namespace}/${name}`;
                } else {
                    url += `/${name}`;
                }

                const data = await fetchAPI(url);

                // Update breadcrumb to show detail view
                updateBreadcrumb(resourceType, name);

                document.getElementById('modal-title').textContent = `${formatViewName(resourceType.replace(/s$/, ''))}: ${namespace ? namespace + '/' : ''}${name}`;

                // Build structured content based on resource type
                let structuredContent = '';

                // Roles and ClusterRoles - show rules
                if (resourceType === 'roles' || resourceType === 'clusterroles') {
                    const rules = data.rules || [];
                    structuredContent = `
                        <div class="bg-slate-700 rounded p-4">
                            <h3 class="text-sm font-semibold text-k8s-blue mb-3">Permissions (${rules.length} rules)</h3>
                            ${rules.length > 0 ? `
                            <div class="overflow-x-auto">
                                <table class="w-full text-xs">
                                    <thead><tr class="text-slate-400 border-b border-slate-600">
                                        <th class="text-left p-2">API Groups</th>
                                        <th class="text-left p-2">Resources</th>
                                        <th class="text-left p-2">Verbs</th>
                                        <th class="text-left p-2">Resource Names</th>
                                    </tr></thead>
                                    <tbody>
                                        ${rules.map(rule => `
                                            <tr class="border-b border-slate-600/50">
                                                <td class="p-2"><span class="text-purple-400">${(rule.apiGroups || ['*']).map(g => g || 'core').join(', ')}</span></td>
                                                <td class="p-2"><span class="text-yellow-400">${(rule.resources || ['*']).join(', ')}</span></td>
                                                <td class="p-2">${(rule.verbs || []).map(v => `<span class="px-1 py-0.5 rounded text-xs ${v === '*' ? 'bg-red-600' : 'bg-green-600/50'}">${v}</span>`).join(' ')}</td>
                                                <td class="p-2 text-slate-400">${(rule.resourceNames || []).join(', ') || '-'}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                            ` : '<p class="text-slate-400 text-sm">No rules defined</p>'}
                        </div>
                    `;
                }

                // Services — type, IPs, ports, selector
                if (resourceType === 'services') {
                    const spec = data.spec || {};
                    const status = data.status || {};
                    const ports = spec.ports || [];
                    const selector = spec.selector || {};
                    const externalIPs = []
                        .concat(spec.externalIPs || [])
                        .concat((status.loadBalancer?.ingress || []).map(i => i.ip || i.hostname).filter(Boolean));
                    structuredContent = `
                        <div class="bg-slate-700 rounded p-4">
                            <h3 class="text-sm font-semibold text-k8s-blue mb-3">Service</h3>
                            <div class="grid grid-cols-2 gap-3 text-sm">
                                <div><span class="text-slate-400">Type:</span> <span class="mono">${spec.type || 'ClusterIP'}</span></div>
                                <div><span class="text-slate-400">Cluster IP:</span> <span class="mono">${spec.clusterIP || '-'}</span></div>
                                ${(spec.clusterIPs || []).length > 1 ? `<div class="col-span-2"><span class="text-slate-400">Cluster IPs:</span> <span class="mono">${spec.clusterIPs.join(', ')}</span></div>` : ''}
                                ${externalIPs.length ? `<div class="col-span-2"><span class="text-slate-400">External IPs:</span> <span class="mono">${externalIPs.join(', ')}</span></div>` : ''}
                                ${spec.sessionAffinity ? `<div><span class="text-slate-400">Session Affinity:</span> ${spec.sessionAffinity}</div>` : ''}
                                ${spec.externalTrafficPolicy ? `<div><span class="text-slate-400">External Traffic Policy:</span> ${spec.externalTrafficPolicy}</div>` : ''}
                            </div>
                        </div>
                        <div class="bg-slate-700 rounded p-4">
                            <h3 class="text-sm font-semibold text-k8s-blue mb-3">Ports (${ports.length})</h3>
                            ${ports.length ? `
                            <table class="w-full text-xs">
                                <thead><tr class="text-slate-400 border-b border-slate-600">
                                    <th class="text-left p-2">Name</th>
                                    <th class="text-left p-2">Port</th>
                                    <th class="text-left p-2">Target Port</th>
                                    <th class="text-left p-2">Node Port</th>
                                    <th class="text-left p-2">Protocol</th>
                                </tr></thead>
                                <tbody>
                                    ${ports.map(p => `
                                        <tr class="border-b border-slate-600/50">
                                            <td class="p-2 mono">${p.name || '-'}</td>
                                            <td class="p-2 mono">${p.port}</td>
                                            <td class="p-2 mono">${p.targetPort ?? '-'}</td>
                                            <td class="p-2 mono">${p.nodePort ?? '-'}</td>
                                            <td class="p-2">${p.protocol || 'TCP'}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>` : '<p class="text-slate-400 text-sm">No ports defined.</p>'}
                        </div>
                        <div class="bg-slate-700 rounded p-4">
                            <h3 class="text-sm font-semibold text-k8s-blue mb-3">Selector</h3>
                            ${Object.keys(selector).length ? `
                            <div class="flex flex-wrap gap-2">
                                ${Object.entries(selector).map(([k, v]) => `<span class="px-2 py-1 bg-slate-600 rounded text-xs mono">${k}=${v}</span>`).join('')}
                            </div>` : '<p class="text-slate-400 text-sm">No selector — typically a headless service or externally managed endpoints.</p>'}
                        </div>
                    `;
                }

                // Ingresses — class, rules (host → paths), TLS
                if (resourceType === 'ingresses') {
                    const spec = data.spec || {};
                    const status = data.status || {};
                    const rules = spec.rules || [];
                    const tls = spec.tls || [];
                    const lb = (status.loadBalancer?.ingress || []).map(i => i.ip || i.hostname).filter(Boolean);
                    const renderBackend = (b) => {
                        if (!b) return '-';
                        if (b.service) {
                            const portTxt = b.service.port?.number ?? b.service.port?.name ?? '';
                            return `<span class="mono">${b.service.name}${portTxt ? ':' + portTxt : ''}</span>`;
                        }
                        return JSON.stringify(b);
                    };
                    structuredContent = `
                        <div class="bg-slate-700 rounded p-4">
                            <h3 class="text-sm font-semibold text-k8s-blue mb-3">Ingress</h3>
                            <div class="grid grid-cols-2 gap-3 text-sm">
                                <div><span class="text-slate-400">Class:</span> <span class="mono">${spec.ingressClassName || '-'}</span></div>
                                <div><span class="text-slate-400">Address:</span> <span class="mono">${lb.join(', ') || '-'}</span></div>
                                ${spec.defaultBackend ? `<div class="col-span-2"><span class="text-slate-400">Default Backend:</span> ${renderBackend(spec.defaultBackend)}</div>` : ''}
                            </div>
                        </div>
                        <div class="bg-slate-700 rounded p-4">
                            <h3 class="text-sm font-semibold text-k8s-blue mb-3">Rules (${rules.length})</h3>
                            ${rules.length ? `
                            <div class="space-y-3">
                                ${rules.map(rule => `
                                    <div class="bg-slate-800 border border-slate-600 rounded p-3">
                                        <div class="text-xs text-slate-400 mb-2">Host: <span class="mono text-white">${rule.host || '*'}</span></div>
                                        ${(rule.http?.paths || []).length ? `
                                        <table class="w-full text-xs">
                                            <thead><tr class="text-slate-400 border-b border-slate-600/50">
                                                <th class="text-left p-1">Path</th>
                                                <th class="text-left p-1">Path Type</th>
                                                <th class="text-left p-1">Backend</th>
                                            </tr></thead>
                                            <tbody>
                                                ${rule.http.paths.map(p => `
                                                    <tr>
                                                        <td class="p-1 mono">${p.path || '/'}</td>
                                                        <td class="p-1">${p.pathType || 'ImplementationSpecific'}</td>
                                                        <td class="p-1">${renderBackend(p.backend)}</td>
                                                    </tr>
                                                `).join('')}
                                            </tbody>
                                        </table>` : '<div class="text-xs text-slate-500">No HTTP paths.</div>'}
                                    </div>
                                `).join('')}
                            </div>` : '<p class="text-slate-400 text-sm">No rules defined.</p>'}
                        </div>
                        ${tls.length ? `
                        <div class="bg-slate-700 rounded p-4">
                            <h3 class="text-sm font-semibold text-k8s-blue mb-3">TLS (${tls.length})</h3>
                            <div class="space-y-2 text-xs">
                                ${tls.map(t => `
                                    <div class="bg-slate-800 border border-slate-600 rounded p-2">
                                        <div><span class="text-slate-400">Hosts:</span> <span class="mono">${(t.hosts || []).join(', ') || '-'}</span></div>
                                        <div><span class="text-slate-400">Secret:</span> <span class="mono">${t.secretName || '-'}</span></div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>` : ''}
                    `;
                }

                // RoleBindings and ClusterRoleBindings - show roleRef and subjects
                if (resourceType === 'rolebindings' || resourceType === 'clusterrolebindings') {
                    const roleRef = data.roleRef || {};
                    const subjects = data.subjects || [];
                    structuredContent = `
                        <div class="bg-slate-700 rounded p-4">
                            <h3 class="text-sm font-semibold text-k8s-blue mb-3">Role Reference</h3>
                            <div class="grid grid-cols-3 gap-4 text-sm">
                                <div><span class="text-slate-400">Kind:</span> <span class="text-yellow-400">${roleRef.kind || '-'}</span></div>
                                <div><span class="text-slate-400">Name:</span> <span class="text-white">${roleRef.name || '-'}</span></div>
                                <div><span class="text-slate-400">API Group:</span> <span class="text-purple-400">${roleRef.apiGroup || 'rbac.authorization.k8s.io'}</span></div>
                            </div>
                        </div>
                        <div class="bg-slate-700 rounded p-4">
                            <h3 class="text-sm font-semibold text-k8s-blue mb-3">Subjects (${subjects.length})</h3>
                            ${subjects.length > 0 ? `
                            <div class="overflow-x-auto">
                                <table class="w-full text-xs">
                                    <thead><tr class="text-slate-400 border-b border-slate-600">
                                        <th class="text-left p-2">Kind</th>
                                        <th class="text-left p-2">Name</th>
                                        <th class="text-left p-2">Namespace</th>
                                    </tr></thead>
                                    <tbody>
                                        ${subjects.map(subj => `
                                            <tr class="border-b border-slate-600/50">
                                                <td class="p-2"><span class="px-2 py-0.5 rounded text-xs ${subj.kind === 'ServiceAccount' ? 'bg-blue-600/50' : subj.kind === 'User' ? 'bg-green-600/50' : 'bg-purple-600/50'}">${subj.kind}</span></td>
                                                <td class="p-2 text-white">${subj.name}</td>
                                                <td class="p-2 text-slate-400">${subj.namespace || '-'}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                            ` : '<p class="text-slate-400 text-sm">No subjects defined</p>'}
                        </div>
                    `;
                }

                document.getElementById('modal-content').innerHTML = `
                    <div class="space-y-4">
                        <div class="bg-slate-700 rounded p-4">
                            <h3 class="text-sm font-semibold text-k8s-blue mb-2">Metadata</h3>
                            <div class="grid grid-cols-2 gap-2 text-sm">
                                <div><span class="text-slate-400">Name:</span> ${data.metadata?.name || name}</div>
                                ${namespace ? `<div><span class="text-slate-400">Namespace:</span> ${data.metadata?.namespace || namespace}</div>` : ''}
                                <div><span class="text-slate-400">UID:</span> <span class="text-xs">${data.metadata?.uid || '-'}</span></div>
                                <div><span class="text-slate-400">Created:</span> ${data.metadata?.creationTimestamp || '-'}</div>
                            </div>
                        </div>
                        ${structuredContent}
                        ${data.metadata?.labels && Object.keys(data.metadata.labels).length > 0 ? `
                        <div class="bg-slate-700 rounded p-4">
                            <h3 class="text-sm font-semibold text-k8s-blue mb-2">Labels</h3>
                            <div class="flex flex-wrap gap-2">
                                ${Object.entries(data.metadata.labels).map(([k, v]) => `
                                    <span class="px-2 py-1 bg-slate-600 rounded text-xs">${k}: ${v}</span>
                                `).join('')}
                            </div>
                        </div>
                        ` : ''}
                        ${data.metadata?.annotations && Object.keys(data.metadata.annotations).length > 0 ? `
                        <div class="bg-slate-700 rounded p-4">
                            <h3 class="text-sm font-semibold text-k8s-blue mb-2">Annotations</h3>
                            <div class="space-y-1 text-xs">
                                ${Object.entries(data.metadata.annotations).slice(0, 10).map(([k, v]) => `
                                    <div><span class="text-slate-400">${k}:</span> ${String(v).substring(0, 100)}${String(v).length > 100 ? '...' : ''}</div>
                                `).join('')}
                                ${Object.keys(data.metadata.annotations).length > 10 ? `<div class="text-slate-500">... and ${Object.keys(data.metadata.annotations).length - 10} more</div>` : ''}
                            </div>
                        </div>
                        ` : ''}
                    </div>
                `;
                document.getElementById('detail-modal').classList.remove('hidden');
            } catch (err) {
                console.error('Failed to load resource detail:', err);
            }
        }

        // Utilities
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('hidden');
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.add('hidden');
            if (window._yamlEditor) {
                try { window._yamlEditor.destroy(); } catch (_) {}
                window._yamlEditor = null;
            }
        }

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Close modal on backdrop click
        document.getElementById('detail-modal').addEventListener('click', (e) => {
            if (e.target.id === 'detail-modal') closeModal();
        });

        // Theme toggle
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');

            if (body.classList.contains('light')) {
                body.classList.remove('light');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.add('light');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                localStorage.setItem('theme', 'light');
            }
        }

        // Load saved theme on page load
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light');
                const icon = document.getElementById('theme-icon');
                if (icon) {
                    icon.classList.remove('fa-sun');
                    icon.classList.add('fa-moon');
                }
            }
        })();
    </script>

    <!-- Import Kubeconfig Modal -->
    <div id="import-modal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center">
        <div class="bg-slate-800 rounded-lg border border-slate-700 w-full max-w-lg mx-4 shadow-2xl">
            <div class="flex items-center justify-between p-4 border-b border-slate-700">
                <h2 class="text-lg font-semibold text-white">Import Kubeconfig</h2>
                <button onclick="closeImportModal()" class="text-slate-400 hover:text-white transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-4">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-300 mb-2">Upload Kubeconfig File</label>
                    <div id="drop-zone" class="relative">
                        <input type="file" id="kubeconfig-file" accept=".yaml,.yml,.conf,*" onchange="handleFileSelect(event)"
                            class="hidden">
                        <label for="kubeconfig-file" id="drop-label"
                            class="flex items-center justify-center gap-2 w-full bg-slate-700 border-2 border-dashed border-slate-500 rounded-lg px-4 py-6 cursor-pointer hover:border-k8s-blue hover:bg-slate-600/50 transition-colors">
                            <i class="fas fa-cloud-upload-alt text-2xl text-slate-400"></i>
                            <div class="text-center">
                                <p class="text-sm text-slate-300">Click to select kubeconfig file</p>
                                <p class="text-xs text-slate-400 mt-1">or drag and drop here</p>
                            </div>
                        </label>
                    </div>
                    <div id="file-info" class="hidden mt-2 p-2 bg-slate-700 rounded flex items-center justify-between">
                        <span class="text-sm text-slate-300"><i class="fas fa-file-code mr-2 text-k8s-blue"></i><span id="file-name"></span></span>
                        <button onclick="clearFileSelection()" class="text-slate-400 hover:text-red-400">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div id="preview-section" class="hidden mb-4">
                    <label class="block text-sm font-medium text-slate-300 mb-2">Available Contexts</label>
                    <div id="contexts-list" class="bg-slate-900 rounded border border-slate-600 max-h-48 overflow-y-auto">
                        <!-- Contexts will be listed here -->
                    </div>
                </div>
                <div id="import-result" class="hidden mb-4 p-3 rounded text-sm">
                    <!-- Import result message -->
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 p-4 border-t border-slate-700">
                <button id="cancel-btn" onclick="closeImportModal()" class="px-4 py-2 text-sm text-slate-300 hover:text-white transition-colors">
                    Cancel
                </button>
                <button id="preview-btn" onclick="previewKubeconfig()" disabled class="px-4 py-2 bg-slate-600 hover:bg-slate-500 text-white text-sm rounded transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    Preview
                </button>
                <button id="import-btn" onclick="importKubeconfig()" class="px-4 py-2 bg-k8s-blue hover:bg-blue-600 text-white text-sm rounded transition-colors hidden">
                    Import
                </button>
                <button id="done-btn" onclick="closeImportModal()" class="px-4 py-2 bg-green-600 hover:bg-green-500 text-white text-sm rounded transition-colors hidden">
                    Done
                </button>
            </div>
        </div>
    </div>
</body>

</html>
